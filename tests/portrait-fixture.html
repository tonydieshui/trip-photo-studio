<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: space-between;
        padding: 34px;
        border: 24px solid #f7b16f;
        background:
          radial-gradient(circle at 72% 24%, #ffd78c 0 7%, transparent 7.3%),
          linear-gradient(160deg, transparent 0 45%, #315f62 45.2% 63%, transparent 63.2%),
          linear-gradient(20deg, transparent 0 47%, #23454e 47.2% 67%, transparent 67.2%),
          linear-gradient(#7197a1 0 58%, #c8915d 58% 100%);
        color: white;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }
      .edge {
        padding: 13px 22px;
        border: 3px solid white;
        border-radius: 999px;
        background: rgba(0,0,0,.42);
        font-size: 26px;
        font-weight: 800;
        letter-spacing: .08em;
      }
      .center {
        padding: 24px;
        background: rgba(0,0,0,.32);
        text-align: center;
      }
      .center strong { display: block; font-size: 62px; }
      .center span { display: block; margin-top: 12px; font-size: 25px; }
    </style>
  </head>
  <body>
    <div class="edge">顶部边缘 · TOP</div>
    <div class="center"><strong>竖图测试</strong><span>完整画面应同时看到顶部和底部</span></div>
    <div class="edge">底部边缘 · BOTTOM</div>
  </body>
</html>
